name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 3️⃣ Login to Amazon ECR
      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
          docker login --username AWS --password-stdin ${{ secrets.ECR_REPOSITORY }}

      # 4️⃣ Build Docker image (FIXED PATH)
      - name: Build Docker image
        run: docker build -t flask-app ./app

      # 5️⃣ Tag Docker image
      - name: Tag Docker image
        run: |
          docker tag flask-app:latest ${{ secrets.ECR_REPOSITORY }}:latest

      # 6️⃣ Push Docker image
      - name: Push Docker image
        run: docker push ${{ secrets.ECR_REPOSITORY }}:latest

      # 🧪 7️⃣ DEBUG SSH (TEMPORARY)
      - name: Debug SSH Connection
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 300s
          debug: true
          script: |
            echo "SSH SUCCESS"
            whoami
            hostname

      # 🚀 8️⃣ Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 300s
          script: |
            echo "Pulling latest image..."
            docker pull ${{ secrets.ECR_REPOSITORY }}:latest

            echo "Stopping existing container..."
            docker stop flask-app || true
            docker rm flask-app || true

            echo "Starting new container..."
            docker run -d -p 80:5000 --name flask-app ${{ secrets.ECR_REPOSITORY }}:latest

            echo "Deployment completed!"